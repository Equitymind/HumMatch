<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e0844"/>
      <stop offset="100%" stop-color="#0d0b1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="350" y1="150" x2="450" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="gradW" x1="100" y1="370" x2="700" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#C44FBF"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="400" cy="400" r="400" fill="url(#bg)"/>

  <!-- Soft glow -->
  <ellipse cx="400" cy="320" rx="160" ry="180" fill="#7c3aed" opacity="0.09"/>

  <!-- ═══ MIC CAPSULE (tall pill) ═══ -->
  <rect x="352" y="148" width="96" height="200" rx="48" fill="url(#grad)"/>

  <!-- ═══ MIC NECK (connects capsule to cradle) ═══ -->
  <rect x="388" y="344" width="24" height="44" fill="url(#grad)"/>

  <!-- ═══ CRADLE ARC (U-shape, sitting flush below neck) ═══ -->
  <path d="M 288 388 C 288 520 400 520 400 520 C 400 520 512 520 512 388"
        fill="none" stroke="url(#gradW)" stroke-width="22" stroke-linecap="round"/>

  <!-- ═══ POLE ═══ -->
  <line x1="400" y1="520" x2="400" y2="608"
        stroke="url(#gradW)" stroke-width="22" stroke-linecap="round"/>

  <!-- ═══ BASE ═══ -->
  <line x1="306" y1="608" x2="494" y2="608"
        stroke="url(#gradW)" stroke-width="22" stroke-linecap="round"/>

  <!-- ═══ SOUND WAVES LEFT ═══ (centered on capsule middle ~y=248) -->
  <path d="M 254 196 Q 212 248 254 300"
        fill="none" stroke="#A855F7" stroke-width="17" stroke-linecap="round" opacity="1.0"/>
  <path d="M 210 168 Q 153 248 210 328"
        fill="none" stroke="#B050E8" stroke-width="13" stroke-linecap="round" opacity="0.78"/>
  <path d="M 168 142 Q 96 248 168 354"
        fill="none" stroke="#C050D8" stroke-width="9" stroke-linecap="round" opacity="0.55"/>

  <!-- ═══ SOUND WAVES RIGHT ═══ -->
  <path d="M 546 196 Q 588 248 546 300"
        fill="none" stroke="#EC4899" stroke-width="17" stroke-linecap="round" opacity="1.0"/>
  <path d="M 590 168 Q 647 248 590 328"
        fill="none" stroke="#D84AAA" stroke-width="13" stroke-linecap="round" opacity="0.78"/>
  <path d="M 632 142 Q 704 248 632 354"
        fill="none" stroke="#C450C0" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
</svg>
