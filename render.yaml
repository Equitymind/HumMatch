services:
  - type: web
    name: vocaliq
    env: node
    buildCommand: npm install
    startCommand: node server.js
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_API_KEY
        sync: false
      - key: BUILD_VERSION
        value: "1.0.0"
      - key: SPOTIFY_AVAILABLE
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: HUMMATCH_EMAIL_USER
        sync: false
      - key: HUMMATCH_EMAIL_PASS
        sync: false
      - key: DB_PATH
        value: /var/data/hummatch.db
    disk:
      name: hummatch-data
      mountPath: /var/data
      sizeGB: 5
