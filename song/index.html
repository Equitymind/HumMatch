<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Directory | HumMatch - Find Your Perfect Songs</title>
  <meta name="description" content="Browse our complete song catalog analyzed for vocal range, difficulty, and timbre. Find songs that match YOUR voice perfectly.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #12101a;
      color: #e2e0f0;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #A855F7, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
      font-size: 1rem;
    }
    .search-box {
      width: 100%;
      max-width: 600px;
      padding: 14px 20px;
      font-size: 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 12px;
      color: #fff;
      margin-bottom: 24px;
    }
    .search-box:focus {
      outline: none;
      border-color: #A855F7;
      background: rgba(255,255,255,0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      overflow: hidden;
    }
    th {
      background: rgba(168,85,247,0.15);
      padding: 14px;
      text-align: left;
      font-weight: 700;
      color: #c084fc;
      border-bottom: 1px solid rgba(168,85,247,0.2);
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    tr:hover {
      background: rgba(168,85,247,0.08);
    }
    a {
      color: #c084fc;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
    .artist { color: rgba(255,255,255,0.6); }
    .range { font-family: 'JetBrains Mono', monospace; color: #A855F7; }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Song Directory</h1>
    <p class="subtitle">Browse songs analyzed for vocal range, difficulty, and timbre matching</p>
    
    <input type="text" class="search-box" id="search" placeholder="Search songs or artists...">
    
    <div id="songs-table">
      <div class="loading">Loading songs...</div>
    </div>
  </div>

  <script>
    // This will be populated from the SONGS array in index.html
    // For now, show a message to generate it
    document.getElementById('songs-table').innerHTML = `
      <div class="loading">
        <p style="margin-bottom:16px;">Song directory coming soon!</p>
        <p>For now, browse individual song pages:</p>
        <p style="margin-top:12px;"><a href="/song/bohemian-rhapsody-queen">Bohemian Rhapsody - Queen</a></p>
        <p><a href="/song/dont-stop-believin-journey">Don't Stop Believin' - Journey</a></p>
        <p><a href="/song/shallow-lady-gaga">Shallow - Lady Gaga</a></p>
        <p style="margin-top:20px;"><a href="/">← Back to HumMatch</a></p>
      </div>
    `;
  </script>
</body>
</html>
